name: Deploy AI Research Agent

on:
  workflow_dispatch:  # Manual trigger only
  push:
    branches: [ main ]
    paths:
      - 'apps/research-agent/**'

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    
    - name: Create DynamoDB Tables
      run: |
        echo "Creating DynamoDB tables in us-east-1..."
        
        # Table 1: ai_findings
        aws dynamodb create-table \
          --table-name ai_findings \
          --attribute-definitions AttributeName=source,AttributeType=S AttributeName=created_at,AttributeType=S \
          --key-schema AttributeName=source,KeyType=HASH AttributeName=created_at,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --region us-east-1 2>&1 | grep -q "ResourceInUseException" && echo "Table ai_findings already exists" || echo "Table ai_findings created"
        
        # Table 2: user_analyses
        aws dynamodb create-table \
          --table-name user_analyses \
          --attribute-definitions AttributeName=user_id,AttributeType=S AttributeName=created_at,AttributeType=S \
          --key-schema AttributeName=user_id,KeyType=HASH AttributeName=created_at,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --region us-east-1 2>&1 | grep -q "ResourceInUseException" && echo "Table user_analyses already exists" || echo "Table user_analyses created"
        
        # Table 3: user_alerts
        aws dynamodb create-table \
          --table-name user_alerts \
          --attribute-definitions AttributeName=user_id,AttributeType=S AttributeName=alert_id,AttributeType=S \
          --key-schema AttributeName=user_id,KeyType=HASH AttributeName=alert_id,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --region us-east-1 2>&1 | grep -q "ResourceInUseException" && echo "Table user_alerts already exists" || echo "Table user_alerts created"
        
        echo "DynamoDB tables ready!"
    
    - name: Install Lambda Dependencies
      working-directory: apps/research-agent
      run: |
        npm ci
    
    - name: Package Lambda
      working-directory: apps/research-agent
      run: |
        zip -r function.zip . -x '*.git*' -x '*.zip' -x '*.sh' -x 'node_modules/aws-sdk/*'
    
    - name: Deploy Lambda Function
      working-directory: apps/research-agent
      run: |
        FUNCTION_NAME="ai-research-agent"
        
        # Check if function exists
        if aws lambda get-function --function-name $FUNCTION_NAME --region us-east-1 2>&1 | grep -q "ResourceNotFoundException"; then
          echo "Creating new Lambda function..."
          
          # Create IAM role
          ROLE_NAME="ai-research-agent-role"
          
          # Create trust policy file
          cat > trust-policy.json << 'EOF'
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Principal": {
                "Service": "lambda.amazonaws.com"
              },
              "Action": "sts:AssumeRole"
            }
          ]
        }
        EOF
          
          # Create or get role
          ROLE_ARN=$(aws iam get-role --role-name $ROLE_NAME --query 'Role.Arn' --output text 2>/dev/null || echo "")
          
          if [ -z "$ROLE_ARN" ]; then
            aws iam create-role \
              --role-name $ROLE_NAME \
              --assume-role-policy-document file://trust-policy.json
            
            aws iam attach-role-policy \
              --role-name $ROLE_NAME \
              --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
            
            aws iam attach-role-policy \
              --role-name $ROLE_NAME \
              --policy-arn arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess
            
            aws iam attach-role-policy \
              --role-name $ROLE_NAME \
              --policy-arn arn:aws:iam::aws:policy/AmazonSESFullAccess
            
            sleep 10
            ROLE_ARN=$(aws iam get-role --role-name $ROLE_NAME --query 'Role.Arn' --output text)
          fi
          
          # Create Lambda function
          aws lambda create-function \
            --function-name $FUNCTION_NAME \
            --runtime nodejs20.x \
            --handler index.handler \
            --role $ROLE_ARN \
            --zip-file fileb://function.zip \
            --timeout 300 \
            --memory-size 512 \
            --environment "Variables={OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }},ORACLE_WEBHOOK_URL=${{ secrets.ORACLE_WEBHOOK_URL }},ORACLE_SECRET=${{ secrets.ORACLE_SECRET }},ENABLE_NITTER=false}"
        else
          echo "Updating existing Lambda function..."
          aws lambda update-function-code \
            --function-name $FUNCTION_NAME \
            --zip-file fileb://function.zip
          
          aws lambda update-function-configuration \
            --function-name $FUNCTION_NAME \
            --environment "Variables={OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }},ORACLE_WEBHOOK_URL=${{ secrets.ORACLE_WEBHOOK_URL }},ORACLE_SECRET=${{ secrets.ORACLE_SECRET }},ENABLE_NITTER=false}"
        fi
    
    - name: Setup EventBridge Cron Trigger
      run: |
        FUNCTION_NAME="ai-research-agent"
        RULE_NAME="daily-ai-research"
        
        # Create rule
        aws events put-rule \
          --name $RULE_NAME \
          --schedule-expression "cron(0 11 * * ? *)" 2>/dev/null || true
        
        # Get Lambda ARN
        FUNCTION_ARN=$(aws lambda get-function --function-name $FUNCTION_NAME --query 'Configuration.FunctionArn' --output text)
        
        # Add target
        aws events put-targets \
          --rule $RULE_NAME \
          --targets "Id=1,Arn=$FUNCTION_ARN" 2>/dev/null || true
        
        # Add permission
        aws lambda add-permission \
          --function-name $FUNCTION_NAME \
          --statement-id EventBridgeInvoke \
          --action lambda:InvokeFunction \
          --principal events.amazonaws.com \
          --source-arn "arn:aws:events:us-east-1:$(aws sts get-caller-identity --query Account --output text):rule/$RULE_NAME" 2>/dev/null || true
        
        echo "EventBridge trigger configured for daily 6 AM EST"
    
    - name: Verify Deployment
      run: |
        echo "=== DynamoDB Tables ==="
        aws dynamodb list-tables --region us-east-1
        
        echo ""
        echo "=== Lambda Function ==="
        aws lambda get-function --function-name ai-research-agent --query 'Configuration.FunctionName,Configuration.State' --output text
        
        echo ""
        echo "=== EventBridge Rules ==="
        aws events list-rules --region us-east-1
    
    - name: Cleanup
      if: always()
      working-directory: apps/research-agent
      run: |
        rm -f trust-policy.json function.zip
