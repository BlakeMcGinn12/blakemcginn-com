name: Fetch Logs Now

on:
  push:
    paths:
      - '.trigger-logs'

jobs:
  fetch-logs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    
    - name: Fetch CloudWatch Logs
      run: |
        mkdir -p logs
        aws logs tail /aws/lambda/ai-research-agent --region us-east-1 --since 2h > logs/latest.txt
        echo "Fetched logs:"
        cat logs/latest.txt | head -50
    
    - name: Commit Logs
      run: |
        git config user.name "Log Bot"
        git config user.email "logs@blakemcginn.com"
        git add logs/
        git commit -m "Fetch Lambda logs" || echo "No changes"
        git push || echo "Nothing to push"
