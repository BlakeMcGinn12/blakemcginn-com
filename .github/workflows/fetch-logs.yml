name: Fetch Lambda Logs

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

jobs:
  fetch-logs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    
    - name: Fetch CloudWatch Logs
      run: |
        echo "Fetching logs from last 2 hours..."
        aws logs filter-log-events \
          --log-group-name /aws/lambda/ai-research-agent \
          --start-time $(($(date +%s) - 7200))000 \
          --output json > logs/lambda-latest.json
        
        echo "Log summary:"
        jq '.events | length' logs/lambda-latest.json
        
        # Also get a human-readable version
        aws logs filter-log-events \
          --log-group-name /aws/lambda/ai-research-agent \
          --start-time $(($(date +%s) - 7200))000 \
          --output text > logs/lambda-latest.txt
    
    - name: Commit Logs
      run: |
        git config user.name "Log Bot"
        git config user.email "logs@blakemcginn.com"
        git add logs/
        git diff --quiet && git diff --staged --quiet || git commit -m "Update Lambda logs"
        git push
